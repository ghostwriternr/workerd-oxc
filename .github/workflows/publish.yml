name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Verify stable release tag
        run: |
          version="$(node -p 'require("./package.json").version')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "package.json version $version does not match tag $GITHUB_REF_NAME"
            exit 1
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "publish.yml only publishes stable x.y.z versions; got $version"
            exit 1
          fi

      - name: Check release workspace
        run: npm run check

      - name: Packed consumer smoke test
        run: npm run pack:worker

      - name: Publish to npm
        run: |
          version="$(node -p 'require("./package.json").version')"
          if npm view "workerd-oxc@$version" version >/dev/null 2>&1; then
            echo "workerd-oxc@$version is already published"
            exit 0
          fi
          npm publish --access public
