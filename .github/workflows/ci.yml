name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Check workspace
        run: npm run check

      - name: Packed consumer smoke test
        run: npm run pack:worker
