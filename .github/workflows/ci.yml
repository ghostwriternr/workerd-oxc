name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Verify committed wasm artifacts
        run: |
          git ls-files --error-unmatch src/wasm/parser.wasm src/wasm/transform.wasm
          npm run wasm:check
          npm run build
          npm run pack:check
          npm run test:node
          npm run test:workers

      - name: Rebuild wasm artifacts
        run: npm run build:wasm

      - name: Check rebuilt workspace
        run: npm run check
